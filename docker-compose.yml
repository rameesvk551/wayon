version: '3.8'

services:
  # AI Trip Planning Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-trip-client
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://server:3000
    depends_on:
      - server
    networks:
      - ai-trip-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # AI Trip Planning Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-trip-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - TRAVEL_BACKEND_URL=${TRAVEL_BACKEND_URL:-http://host.docker.internal:4000}
    env_file:
      - ./server/.env
    networks:
      - ai-trip-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  ai-trip-network:
    driver: bridge
