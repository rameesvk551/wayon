name: CI - AI Trip Planning

on:
  push:
    branches: [main, develop]
    paths:
      - 'client/**'
      - 'server/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'client/**'
      - 'server/**'

env:
  NODE_VERSION: '20'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  # Client CI - React/Vite/TypeScript
  client:
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Build
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # Server CI - Express/LangChain
  server:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for syntax errors
        run: node --check src/server.js
      
      - name: Build Docker image
        run: docker build -t ai-trip-server:test .

  # Build Docker images for validation
  docker-build:
    needs: [client, server]
    if: always() && (needs.client.result == 'success' || needs.client.result == 'skipped') && (needs.server.result == 'success' || needs.server.result == 'skipped')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build client Docker image
        if: needs.client.result == 'success'
        run: docker build -t ai-trip-client:test ./client
      
      - name: Build server Docker image
        if: needs.server.result == 'success'
        run: docker build -t ai-trip-server:test ./server

  ci-summary:
    runs-on: ubuntu-latest
    needs: [client, server, docker-build]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "## CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ${{ needs.client.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ needs.server.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
